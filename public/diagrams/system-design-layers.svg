<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <rect width="480" height="300" fill="#EBE1CB" rx="8"/>

  <!-- title -->
  <text x="240" y="24" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#4a3f35" letter-spacing="0.08em">LAYERED ARCHITECTURE</text>

  <!-- layers -->
  <!-- Client -->
  <rect x="60" y="42" width="360" height="40" rx="5" fill="#C83C29" fill-opacity="0.12" stroke="#C83C29" stroke-opacity="0.4" stroke-width="1"/>
  <text x="240" y="67" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#1A1410">Client / Browser</text>

  <!-- arrows -->
  <line x1="240" y1="82" x2="240" y2="98" stroke="#8A7F6E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- API Gateway -->
  <rect x="60" y="98" width="360" height="40" rx="5" fill="#EBE1CB" stroke="#8A7F6E" stroke-width="1"/>
  <text x="240" y="123" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#1A1410">API Gateway / Load Balancer</text>

  <line x1="240" y1="138" x2="240" y2="154" stroke="#8A7F6E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Services -->
  <rect x="60" y="154" width="360" height="40" rx="5" fill="#EBE1CB" stroke="#8A7F6E" stroke-width="1"/>
  <text x="240" y="179" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#1A1410">Application Services</text>

  <line x1="240" y1="194" x2="240" y2="210" stroke="#8A7F6E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Data layer split -->
  <rect x="60" y="210" width="160" height="40" rx="5" fill="#EBE1CB" stroke="#8A7F6E" stroke-width="1"/>
  <text x="140" y="235" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#1A1410">Database</text>

  <rect x="260" y="210" width="160" height="40" rx="5" fill="#EBE1CB" stroke="#8A7F6E" stroke-width="1"/>
  <text x="340" y="235" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#1A1410">Cache (Redis)</text>

  <!-- arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,1 L8,4 L0,7 Z" fill="#8A7F6E"/>
    </marker>
  </defs>

  <!-- side label -->
  <text x="30" y="165" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#8A7F6E" transform="rotate(-90 30 165)">REQUESTS</text>
</svg>
