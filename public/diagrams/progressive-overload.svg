<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" width="480" height="280">
  <rect width="480" height="280" fill="#EBE1CB" rx="8"/>

  <!-- axes -->
  <line x1="60" y1="220" x2="440" y2="220" stroke="#8A7F6E" stroke-width="1.5"/>
  <line x1="60" y1="40" x2="60" y2="220" stroke="#8A7F6E" stroke-width="1.5"/>

  <!-- axis labels -->
  <text x="250" y="250" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#8A7F6E">WEEKS</text>
  <text x="20" y="135" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#8A7F6E" transform="rotate(-90 20 135)">LOAD</text>

  <!-- overload line (steps up) -->
  <polyline points="80,190 120,190 120,170 160,170 160,150 200,150 200,130 240,130 240,115 280,115 280,100 320,100 320,88 360,88 360,75 400,75"
    fill="none" stroke="#C83C29" stroke-width="2" stroke-linejoin="round"/>

  <!-- deload dip -->
  <polyline points="400,75 420,110 440,90"
    fill="none" stroke="#C83C29" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- tick marks x -->
  <line x1="120" y1="220" x2="120" y2="225" stroke="#8A7F6E" stroke-width="1"/>
  <line x1="200" y1="220" x2="200" y2="225" stroke="#8A7F6E" stroke-width="1"/>
  <line x1="280" y1="220" x2="280" y2="225" stroke="#8A7F6E" stroke-width="1"/>
  <line x1="360" y1="220" x2="360" y2="225" stroke="#8A7F6E" stroke-width="1"/>
  <text x="120" y="236" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#8A7F6E">4</text>
  <text x="200" y="236" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#8A7F6E">8</text>
  <text x="280" y="236" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#8A7F6E">12</text>
  <text x="360" y="236" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#8A7F6E">16</text>

  <!-- labels -->
  <text x="310" y="70" font-family="JetBrains Mono, monospace" font-size="10" fill="#C83C29">accumulation</text>
  <text x="405" y="108" font-family="JetBrains Mono, monospace" font-size="10" fill="#8A7F6E">deload</text>

  <!-- title -->
  <text x="250" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#4a3f35" letter-spacing="0.08em">PROGRESSIVE OVERLOAD MODEL</text>
</svg>
