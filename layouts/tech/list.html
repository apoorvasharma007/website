{{ define "main" }}
<section class="section fade-in">
  <h1 class="section-title">Tech</h1>
  <p class="muted">{{ .Content }}</p>

  <div class="code-project-list">
    {{ range .Pages.ByWeight }}
      <details class="project-card">
        <summary class="project-summary">
          <span class="project-title">{{ .Title }}</span>
          {{ with .Params.status }}
            <span class="project-status {{ . }}">{{ . }}</span>
          {{ end }}
        </summary>
        <div class="project-body">
          <p class="project-desc">{{ .Params.summary }}</p>
          {{ with .Params.tags }}
            <div class="blog-row-tags">
              {{ range . }}<span class="tag-indicator">{{ . }}</span>{{ end }}
            </div>
          {{ end }}
          {{ with .Params.github }}
            <a class="project-gh-link" href="{{ . }}" target="_blank" rel="noopener">View on GitHub →</a>
          {{ end }}
        </div>
      </details>
    {{ end }}
  </div>
</section>
{{ end }}
