{{ $ebook := .Site.GetPage "/fitness/ebook" }}
{{ $current := .RelPermalink }}
<nav class="ebook-sidebar">
  <a class="ebook-sidebar-title{{ if eq $current $ebook.RelPermalink }} active{{ end }}" href="{{ $ebook.RelPermalink }}">Fitness Ebook</a>
  {{ range $ebook.Sections.ByWeight }}
    {{ $section := . }}
    {{ $isActive := hasPrefix $current .RelPermalink }}
    <details{{ if $isActive }} open{{ end }}>
      <summary>
        <a href="{{ .RelPermalink }}" class="{{ if eq $current .RelPermalink }}active{{ end }}">{{ .Title }}</a>
      </summary>
      <ul class="ebook-sidebar-pages">
        {{ range .Pages.ByWeight }}
          <li>
            <a href="{{ .RelPermalink }}" class="{{ if eq $current .RelPermalink }}active{{ end }}">{{ .Title }}</a>
          </li>
        {{ end }}
      </ul>
    </details>
  {{ end }}
</nav>
