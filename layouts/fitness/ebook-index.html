{{ define "main" }}
<div class="ebook-layout fade-in">
  {{ partial "ebook-sidebar.html" . }}
  <article class="ebook-content">
    <span class="label">Ebook</span>
    <h1 class="section-title">{{ .Title }}</h1>
    <p>{{ .Content }}</p>

    <div class="ebook-toc">
      {{ range .Sections.ByWeight }}
        <div class="ebook-toc-section">
          <h2 class="ebook-toc-heading"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
          {{ with .Content }}<p class="ebook-toc-desc">{{ . }}</p>{{ end }}
          {{ if .Pages }}
            <ul class="ebook-toc-pages">
              {{ range .Pages.ByWeight }}
                <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
              {{ end }}
            </ul>
          {{ end }}
        </div>
      {{ end }}
    </div>
  </article>
</div>
{{ end }}
