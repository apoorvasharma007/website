{{ define "main" }}
<article class="single fade-in">
  <header class="single-header">
    <h1 class="single-title">{{ .Title }}</h1>
    <div class="single-meta">
      <span class="meta-date">{{ .Date.Format "02 Jan 2006" }}</span>
      <span>·</span>
      <span class="meta-read">{{ .ReadingTime }} min read</span>
    </div>
    {{ with .Params.tags }}
      <div class="post-tags">
        {{ range . }}
          <a class="tag-pill" href="{{ "/tags/" | relURL }}{{ urlize . }}">{{ . }}</a>
        {{ end }}
      </div>
    {{ end }}
  </header>

  <div class="content">
    {{ .Content }}
  </div>
</article>
{{ end }}
