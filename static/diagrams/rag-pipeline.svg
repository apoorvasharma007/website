<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200">
  <rect width="520" height="200" fill="#EBE1CB" rx="8"/>

  <!-- title -->
  <text x="260" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#4a3f35" letter-spacing="0.08em">RAG PIPELINE</text>

  <!-- boxes -->
  <rect x="20" y="75" width="90" height="36" rx="5" fill="#EBE1CB" stroke="#8A7F6E" stroke-width="1"/>
  <text x="65" y="98" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#1A1410">Query</text>

  <rect x="140" y="75" width="90" height="36" rx="5" fill="#EBE1CB" stroke="#8A7F6E" stroke-width="1"/>
  <text x="185" y="98" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#1A1410">Embed</text>

  <rect x="260" y="75" width="90" height="36" rx="5" fill="#EBE1CB" stroke="#C83C29" stroke-opacity="0.5" stroke-width="1"/>
  <text x="305" y="91" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#1A1410">Vector</text>
  <text x="305" y="104" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#1A1410">Search</text>

  <rect x="380" y="75" width="90" height="36" rx="5" fill="#C83C29" fill-opacity="0.12" stroke="#C83C29" stroke-opacity="0.4" stroke-width="1"/>
  <text x="425" y="91" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#1A1410">LLM +</text>
  <text x="425" y="104" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#1A1410">Context</text>

  <!-- arrows -->
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,1 L8,4 L0,7 Z" fill="#8A7F6E"/>
    </marker>
  </defs>
  <line x1="110" y1="93" x2="138" y2="93" stroke="#8A7F6E" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="230" y1="93" x2="258" y2="93" stroke="#8A7F6E" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="350" y1="93" x2="378" y2="93" stroke="#8A7F6E" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- retrieval annotation -->
  <text x="305" y="130" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#8A7F6E">top-k chunks</text>
  <line x1="305" y1="111" x2="305" y2="123" stroke="#8A7F6E" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- output -->
  <text x="425" y="148" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#C83C29">grounded answer</text>
  <line x1="425" y1="111" x2="425" y2="141" stroke="#C83C29" stroke-width="1" stroke-dasharray="3 2"/>
</svg>
